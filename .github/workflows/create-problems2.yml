name: 問題生成パイプライン

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '語数タイプ（docs/words から LATEST に続き N 語を処理）'
        required: true
        default: 'all'
        type: choice
        options:
          - short
          - medium
          - long
          - all
          - kids
          - nonKids
      count:
        description: '使用するワード数（DBの words テーブルから先頭N件を取得）'
        required: false
        default: '3'
        type: string

jobs:
  create-and-seed:
    name: 問題生成 & DB投入（create-problems3）
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
          echo "PRISMA_CLIENT_DISABLE_PREPARED_STATEMENTS=true" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate required secrets
        run: |
          echo "🔍 必要なシークレットの存在確認中..."

          REQUIRED_SECRETS=(
            "OPENAI_API_KEY"
            "DATABASE_URL"
          )

          MISSING_SECRETS=()

          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              MISSING_SECRETS+=("$secret")
            fi
          done

          if [ ${#MISSING_SECRETS[@]} -eq 0 ]; then
            echo "✅ すべての必要なシークレットが設定されています"
          else
            echo "❌ 以下のシークレットが設定されていません:"
            printf '  - %s\n' "${MISSING_SECRETS[@]}"
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 問題生成（--batch） & 任意で DB 投入
        id: create
        run: |
          INPUT_MODE="${{ github.event.inputs.mode || 'all' }}"
          INPUT_COUNT="${{ github.event.inputs.count || '3' }}"

          echo "🚀 create-problems3 を開始します"
          echo "📌 モード: $INPUT_MODE / ワード数: $INPUT_COUNT"
          echo "📍 DBの words テーブルから先頭 $INPUT_COUNT 件を取得します"
          echo "🌱 DB 直接投入モード（--seed）"

          NODE_ENV=production npx tsx scripts/create-problems3.ts \
            --batch \
            --mode="$INPUT_MODE" \
            --count="$INPUT_COUNT" \
            --seed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 生成サマリー
        run: |
          echo ""
          echo "🎊 ================================================"
          echo "🎉 create-problems3 ジョブが完了しました"
          echo "🎊 ================================================"
          echo "📌 モード: ${{ github.event.inputs.mode }}"
          echo "📊 ワード数: ${{ github.event.inputs.count || '5' }}"
          echo "🌱 DB投入: true"
          echo ""

  fix-audio:
    name: 音声URL修復
    needs: create-and-seed
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
          echo "PRISMA_CLIENT_DISABLE_PREPARED_STATEMENTS=true" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate required secrets
        run: |
          REQUIRED_SECRETS=(
            "OPENAI_API_KEY"
            "DATABASE_URL"
            "R2_BUCKET_NAME"
            "R2_ACCESS_KEY_ID"
            "R2_SECRET_ACCESS_KEY"
          )
          MISSING_SECRETS=()
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              MISSING_SECRETS+=("$secret")
            fi
          done
          if [ ${#MISSING_SECRETS[@]} -eq 0 ]; then
            echo "✅ すべての必要なシークレットが設定されています"
          else
            echo "❌ 以下のシークレットが設定されていません:"
            printf '  - %s\n' "${MISSING_SECRETS[@]}"
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Check for missing audio files
        id: check_missing
        run: |
          MISSING_COUNT=$(NODE_ENV=production npx tsx scripts/fix-missing-audio.ts --check-only 2>/dev/null | tail -1)
          if [[ "$MISSING_COUNT" =~ ^[0-9]+$ ]]; then
            echo "missing_count=$MISSING_COUNT" >> $GITHUB_OUTPUT
            if [ "$MISSING_COUNT" -eq 0 ]; then
              echo "✅ 音声URLがnullなレコードは見つかりませんでした"
              echo "should_run=false" >> $GITHUB_OUTPUT
            else
              echo "📊 $MISSING_COUNT件の音声URLがnullなレコードが見つかりました"
              echo "should_run=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ レコード数の取得に失敗しました。スクリプトを実行します。"
            echo "missing_count=unknown" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run fix-missing-audio script
        if: steps.check_missing.outputs.should_run == 'true'
        run: |
          COUNT="${{ github.event.inputs.count || '5' }}"
          INPUT_BATCH_SIZE=$(( COUNT * 30 ))
          echo "🚀 音声URL修復スクリプトを開始します（処理件数上限: $INPUT_BATCH_SIZE件）"
          npx tsx scripts/fix-missing-audio.ts "$INPUT_BATCH_SIZE"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Wait for cleanup
        if: steps.check_missing.outputs.should_run == 'true'
        run: sleep 5

      - name: Verify fixed audio URLs
        if: steps.check_missing.outputs.should_run == 'true'
        run: |
          REMAINING_COUNT=$(timeout 30 NODE_ENV=production npx tsx scripts/fix-missing-audio.ts --check-only 2>/dev/null | tail -1 || echo "TIMEOUT")
          if [ "$REMAINING_COUNT" = "TIMEOUT" ]; then
            echo "⚠️ DB確認はタイムアウトしましたが、スクリプトは正常に実行されました"
          elif [[ "$REMAINING_COUNT" =~ ^[0-9]+$ ]]; then
            FIXED_COUNT=$((${{ steps.check_missing.outputs.missing_count }} - REMAINING_COUNT))
            echo "✅ $FIXED_COUNT件のレコードの音声URLを修復しました（残り: $REMAINING_COUNT件）"
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  fix-image:
    name: 画像URL修復
    needs: create-and-seed
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
