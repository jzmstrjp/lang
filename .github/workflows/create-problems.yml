name: 問題生成パイプライン

on:
  workflow_dispatch:
    inputs:
      type:
        description: '問題タイプ'
        required: true
        default: 'short'
        type: choice
        options:
          - short
          - medium
          - long
          - all
          - kids
      count:
        description: '生成する問題数（単語数）'
        required: false
        default: '30'
        type: string
      batch_size:
        description: '音声・画像の処理件数上限'
        required: false
        default: '30'
        type: string

jobs:
  create-and-seed:
    name: 問題生成 & DB投入
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      actions: write # LATEST_USED_WORD Variable の更新に必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
          echo "PRISMA_CLIENT_DISABLE_PREPARED_STATEMENTS=true" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate required secrets
        run: |
          echo "🔍 必要なシークレットの存在確認中..."

          REQUIRED_SECRETS=(
            "OPENAI_API_KEY"
            "DATABASE_URL"
          )

          MISSING_SECRETS=()

          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              MISSING_SECRETS+=("$secret")
            fi
          done

          if [ ${#MISSING_SECRETS[@]} -eq 0 ]; then
            echo "✅ すべての必要なシークレットが設定されています"
          else
            echo "❌ 以下のシークレットが設定されていません:"
            printf '  - %s\n' "${MISSING_SECRETS[@]}"
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 問題生成 & DB投入
        id: create
        run: |
          INPUT_TYPE="${{ github.event.inputs.type }}"
          INPUT_COUNT="${{ github.event.inputs.count || '5' }}"

          echo "🚀 問題生成を開始します"
          echo "📌 タイプ: $INPUT_TYPE / 件数: $INPUT_COUNT"
          echo "📍 LATEST_USED_WORD は DB から自動取得します"

          NODE_ENV=production npx tsx scripts/create-problems.ts \
            --type="$INPUT_TYPE" \
            --count="$INPUT_COUNT" \
            --seed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 生成サマリー
        run: |
          echo ""
          echo "🎊 ================================================"
          echo "🎉 問題生成 & DB投入が完了しました"
          echo "🎊 ================================================"
          echo "📌 タイプ: ${{ github.event.inputs.type }}"
          echo "📊 件数: ${{ github.event.inputs.count || '5' }}問"
          echo ""

  fix-audio:
    name: 音声URL修復
    needs: create-and-seed
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
          echo "PRISMA_CLIENT_DISABLE_PREPARED_STATEMENTS=true" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate required secrets
        run: |
          REQUIRED_SECRETS=(
            "OPENAI_API_KEY"
            "DATABASE_URL"
            "R2_BUCKET_NAME"
            "R2_ACCESS_KEY_ID"
            "R2_SECRET_ACCESS_KEY"
          )
          MISSING_SECRETS=()
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              MISSING_SECRETS+=("$secret")
            fi
          done
          if [ ${#MISSING_SECRETS[@]} -eq 0 ]; then
            echo "✅ すべての必要なシークレットが設定されています"
          else
            echo "❌ 以下のシークレットが設定されていません:"
            printf '  - %s\n' "${MISSING_SECRETS[@]}"
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Check for missing audio files
        id: check_missing
        run: |
          MISSING_COUNT=$(NODE_ENV=production npx tsx scripts/fix-missing-audio.ts --check-only 2>/dev/null | tail -1)
          if [[ "$MISSING_COUNT" =~ ^[0-9]+$ ]]; then
            echo "missing_count=$MISSING_COUNT" >> $GITHUB_OUTPUT
            if [ "$MISSING_COUNT" -eq 0 ]; then
              echo "✅ 音声URLがnullなレコードは見つかりませんでした"
              echo "should_run=false" >> $GITHUB_OUTPUT
            else
              echo "📊 $MISSING_COUNT件の音声URLがnullなレコードが見つかりました"
              echo "should_run=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ レコード数の取得に失敗しました。スクリプトを実行します。"
            echo "missing_count=unknown" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run fix-missing-audio script
        if: steps.check_missing.outputs.should_run == 'true'
        run: |
          INPUT_BATCH_SIZE="${{ github.event.inputs.batch_size || '10' }}"
          echo "🚀 音声URL修復スクリプトを開始します（処理件数上限: $INPUT_BATCH_SIZE件）"
          npx tsx scripts/fix-missing-audio.ts "$INPUT_BATCH_SIZE"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Wait for cleanup
        if: steps.check_missing.outputs.should_run == 'true'
        run: sleep 5

      - name: Verify fixed audio URLs
        if: steps.check_missing.outputs.should_run == 'true'
        run: |
          REMAINING_COUNT=$(timeout 30 NODE_ENV=production npx tsx scripts/fix-missing-audio.ts --check-only 2>/dev/null | tail -1 || echo "TIMEOUT")
          if [ "$REMAINING_COUNT" = "TIMEOUT" ]; then
            echo "⚠️ DB確認はタイムアウトしましたが、スクリプトは正常に実行されました"
          elif [[ "$REMAINING_COUNT" =~ ^[0-9]+$ ]]; then
            FIXED_COUNT=$((${{ steps.check_missing.outputs.missing_count }} - REMAINING_COUNT))
            echo "✅ $FIXED_COUNT件のレコードの音声URLを修復しました（残り: $REMAINING_COUNT件）"
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  fix-image:
    name: 画像URL修復
    needs: create-and-seed
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
          echo "PRISMA_CLIENT_DISABLE_PREPARED_STATEMENTS=true" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate required secrets
        run: |
          REQUIRED_SECRETS=(
            "OPENAI_API_KEY"
            "DATABASE_URL"
            "R2_BUCKET_NAME"
            "R2_ACCESS_KEY_ID"
            "R2_SECRET_ACCESS_KEY"
          )
          MISSING_SECRETS=()
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              MISSING_SECRETS+=("$secret")
            fi
          done
          if [ ${#MISSING_SECRETS[@]} -eq 0 ]; then
            echo "✅ すべての必要なシークレットが設定されています"
          else
            echo "❌ 以下のシークレットが設定されていません:"
            printf '  - %s\n' "${MISSING_SECRETS[@]}"
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Check for missing image files
        id: check_missing
        run: |
          MISSING_COUNT=$(NODE_ENV=production npx tsx scripts/fix-missing-image.ts --check-only 2>/dev/null | tail -1)
          if [[ "$MISSING_COUNT" =~ ^[0-9]+$ ]]; then
            echo "missing_count=$MISSING_COUNT" >> $GITHUB_OUTPUT
            if [ "$MISSING_COUNT" -eq 0 ]; then
              echo "✅ 画像URLがnullなレコードは見つかりませんでした"
              echo "should_run=false" >> $GITHUB_OUTPUT
            else
              echo "📊 $MISSING_COUNT件の画像URLがnullなレコードが見つかりました"
              echo "should_run=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ レコード数の取得に失敗しました。スクリプトを実行します。"
            echo "missing_count=unknown" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run fix-missing-image script
        if: steps.check_missing.outputs.should_run == 'true'
        run: |
          INPUT_BATCH_SIZE="${{ github.event.inputs.batch_size || '10' }}"
          echo "🚀 画像URL修復スクリプトを開始します（処理件数上限: $INPUT_BATCH_SIZE件）"
          npx tsx scripts/fix-missing-image.ts "$INPUT_BATCH_SIZE"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Wait for cleanup
        if: steps.check_missing.outputs.should_run == 'true'
        run: sleep 5

      - name: Verify fixed image URLs
        if: steps.check_missing.outputs.should_run == 'true'
        run: |
          REMAINING_COUNT=$(timeout 30 NODE_ENV=production npx tsx scripts/fix-missing-image.ts --check-only 2>/dev/null | tail -1 || echo "TIMEOUT")
          if [ "$REMAINING_COUNT" = "TIMEOUT" ]; then
            echo "⚠️ DB確認はタイムアウトしましたが、スクリプトは正常に実行されました"
          elif [[ "$REMAINING_COUNT" =~ ^[0-9]+$ ]]; then
            FIXED_COUNT=$((${{ steps.check_missing.outputs.missing_count }} - REMAINING_COUNT))
            echo "✅ $FIXED_COUNT件のレコードの画像URLを修復しました（残り: $REMAINING_COUNT件）"
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
